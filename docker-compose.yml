
services:

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    restart: unless-stopped
    volumes:
      - osrm_data:/data
    ports:
      - "5000:5000"
    command: >
      osrm-routed
      --algorithm mld
      --port 5000
      --max-table-size 10000
      --max-matching-size 1000
      --threads 4
      /data/kyiv-region.osrm
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5000' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flower-optimizer-backend:latest
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      REDIS_URL: redis://redis:6379
      OSRM_URL: http://osrm:5000/table/v1/driving
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
      osrm:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    image: flower-optimizer-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started

volumes:
  redis_data:
  osrm_data:
