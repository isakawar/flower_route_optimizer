services:

  # ── OSRM: step 1 — download Ukraine OSM data (runs once, alpine has curl) ────
  osrm-init:
    image: alpine:3
    restart: "no"
    volumes:
      - osrm_data:/data
    command: >
      sh -c "
        if [ ! -f /data/ukraine-latest.osm.pbf ] && [ ! -f /data/ukraine-latest.osrm ]; then
          apk add --no-cache curl &&
          echo 'Downloading Ukraine OSM data (~400 MB)...' &&
          curl -L -o /data/ukraine-latest.osm.pbf https://download.geofabrik.de/europe/ukraine-latest.osm.pbf &&
          echo 'Download complete.'
        else
          echo 'OSM data already present, skipping download.'
        fi
      "

  # ── OSRM: step 2 — preprocess graph + run router ─────────────────────────────
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    restart: unless-stopped
    volumes:
      - osrm_data:/data
    depends_on:
      osrm-init:
        condition: service_completed_successfully
    entrypoint: >
      sh -c "
        if [ ! -f /data/ukraine-latest.osrm ]; then
          echo 'Preprocessing OSRM graph (3-5 min)...' &&
          osrm-extract -p /opt/car.lua /data/ukraine-latest.osm.pbf &&
          osrm-partition /data/ukraine-latest.osrm &&
          osrm-customize /data/ukraine-latest.osrm &&
          rm -f /data/ukraine-latest.osm.pbf &&
          echo 'OSRM graph ready.'
        fi &&
        osrm-routed --algorithm mld /data/ukraine-latest.osrm --port 5000 --max-table-size 1000
      "
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5000' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s

  # ── Redis (geocoding cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python / FastAPI backend ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flower-optimizer-backend:latest
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      REDIS_URL: redis://redis:6379
      OSRM_URL: http://osrm:5000/table/v1/driving
    env_file:
      # Create a .env file with secrets (GOOGLE_MAPS_API_KEY, etc.).
      # The file is optional — the service starts without it.
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
      osrm:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    image: flower-optimizer-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  # Redis RDB snapshot — geocodes survive container restarts
  redis_data:
  # OSRM preprocessed Ukraine road graph — persists across container restarts
  osrm_data:
