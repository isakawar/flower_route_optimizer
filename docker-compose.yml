services:

  # ── Redis (geocoding cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python / FastAPI backend ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flower-optimizer-backend:latest
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      REDIS_URL: redis://redis:6379
    env_file:
      # Create a .env file with secrets (GOOGLE_MAPS_API_KEY, etc.).
      # The file is optional — the service starts without it.
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    image: flower-optimizer-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  # Redis RDB snapshot — geocodes survive container restarts
  redis_data:
