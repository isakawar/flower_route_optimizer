services:

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    restart: unless-stopped
    volumes:
      - osrm_data:/data
    entrypoint: >
      sh -c "
        if [ ! -f /data/ukraine-latest.osrm ]; then
          echo 'Downloading Ukraine OSM data...' &&
          wget -q -O /data/ukraine-latest.osm.pbf https://download.geofabrik.de/europe/ukraine-latest.osm.pbf &&
          echo 'Preprocessing OSRM graph (this takes ~3-5 min)...' &&
          osrm-extract -p /opt/car.lua /data/ukraine-latest.osm.pbf &&
          osrm-partition /data/ukraine-latest.osrm &&
          osrm-customize /data/ukraine-latest.osrm &&
          rm /data/ukraine-latest.osm.pbf &&
          echo 'OSRM graph ready.'
        fi &&
        osrm-routed --algorithm mld /data/ukraine-latest.osrm --port 5000 --max-table-size 1000
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/isakawar/flower-route-optimizer-backend:latest}
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379
      OSRM_URL: http://osrm:5000/table/v1/driving
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      osrm:
        condition: service_healthy
    # OR-Tools is CPU + memory heavy during optimization.
    # Health check must tolerate 60+ second CPU bursts without triggering a restart.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=25)\"",
        ]
      interval: 60s      # check less often — optimizer runs for 30-90 s
      timeout: 30s       # allow slow responses under CPU load
      retries: 5         # tolerate up to 5 consecutive failures (~5 min grace)
      start_period: 60s  # don't count failures during cold start
    deploy:
      resources:
        limits:
          memory: 3g     # OR-Tools can spike to 1-2 GB; cap prevents OOM kill

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/isakawar/flower-route-optimizer-frontend:latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    # No service_healthy condition: frontend just needs the backend port to exist.
    # A healthy backend is confirmed by the backend's own healthcheck above.
    depends_on:
      - backend

volumes:
  redis_data:
  osrm_data:
