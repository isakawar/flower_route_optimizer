services:

  # ── Redis (geocoding cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/isakawar/flower-route-optimizer-backend:latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Watchtower watches only containers with this label
      com.centurylinklabs.watchtower.enable: "true"

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/isakawar/flower-route-optimizer-frontend:latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ── Watchtower (auto-pull updated images from GHCR) ───────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      # Docker socket — required to manage other containers
      - /var/run/docker.sock:/var/run/docker.sock
      # GHCR credentials (created once on VPS via: docker login ghcr.io)
      - /root/.docker/config.json:/config.json:ro
    environment:
      # Only watch containers labelled com.centurylinklabs.watchtower.enable=true
      WATCHTOWER_LABEL_ENABLE: "true"
      # Poll GHCR every 5 minutes
      WATCHTOWER_POLL_INTERVAL: "300"
      # Remove old images after pulling new ones
      WATCHTOWER_CLEANUP: "true"
      # Notify on updates (optional — remove if not needed)
      # WATCHTOWER_NOTIFICATIONS: slack
      # WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: ${SLACK_WEBHOOK_URL}

volumes:
  redis_data:
